openapi: 3.0.0
info:
  title: Application API
  description: |
    REST API for the application, designed for managing core business entities and processes.
    
    This API follows RESTful design principles and implements best practices for scalable API development.
    
    ## Features
    - Entity management with CRUD operations
    - Relationship tracking between entities
    - File upload capabilities
    - Comprehensive filtering, sorting, and pagination support
    
  version: 1.0.0
  contact:
    name: Development Team
  license:
    name: MIT
    
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.example.com
    description: Production server

paths:
  /entities:
    get:
      summary: Get all entities
      description: Retrieve a paginated list of entities with optional filtering and sorting capabilities
      tags:
        - Entities
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of entities per page
        - in: query
          name: search
          schema:
            type: string
          description: Search term to filter entities by name or other fields
        - in: query
          name: sort
          schema:
            type: string
            enum: [name, createdAt, updatedAt]
            default: name
          description: Field to sort entities by
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort order
      responses:
        '200':
          description: Successfully retrieved entities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityListResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    post:
      summary: Create a new entity
      description: Add a new entity to the system with required information
      tags:
        - Entities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequest'
      responses:
        '201':
          description: Entity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntityResponse'
        '400':
          description: Validation error or duplicate data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /entities/{id}:
    get:
      summary: Get entity by ID
      description: Retrieve detailed information about a specific entity
      tags:
        - Entities
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Entity ID
      responses:
        '200':
          description: Successfully retrieved entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetails'
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    put:
      summary: Update entity
      description: |
        Update an existing entity with new information. Supports partial updates - only fields provided in the request body will be updated.
        Fields not provided will maintain their existing values in the database.
      tags:
        - Entities
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Entity ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityRequest'
      responses:
        '200':
          description: Entity updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateEntityResponse'
        '400':
          description: Validation error or invalid reference data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    delete:
      summary: Delete entity
      description: Remove an entity from the system
      tags:
        - Entities
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Entity ID
      responses:
        '204':
          description: Entity deleted successfully
        '404':
          description: Entity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upload:
    post:
      summary: Upload file
      description: Upload a file (PDF, DOCX, images, etc.) for storage
      tags:
        - File Upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max size as configured)
              required:
                - file
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Invalid file type or file too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Upload error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    EntityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Entity'
        metadata:
          $ref: '#/components/schemas/PaginationMetadata'
      required:
        - data
        - metadata

    Entity:
      type: object
      properties:
        id:
          type: integer
          description: Unique entity identifier
        name:
          type: string
          description: Entity name
        email:
          type: string
          format: email
          description: Entity email address
        description:
          type: string
          nullable: true
          description: Entity description
        status:
          type: string
          description: Entity status
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - name

    EntityDetails:
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          properties:
            relatedItems:
              type: array
              items:
                $ref: '#/components/schemas/RelatedItem'

    CreateEntityRequest:
      type: object
      properties:
        name:
          type: string
          description: Entity name
        email:
          type: string
          format: email
          description: Entity email address
        description:
          type: string
          nullable: true
          description: Entity description
        status:
          type: string
          description: Entity status
      required:
        - name

    CreateEntityResponse:
      type: object
      properties:
        id:
          type: integer
          description: Created entity ID
        name:
          type: string
        email:
          type: string
        status:
          type: string
      required:
        - id
        - name

    UpdateEntityRequest:
      type: object
      properties:
        name:
          type: string
          description: Entity name
        email:
          type: string
          format: email
          description: Entity email address
        description:
          type: string
          nullable: true
          description: Entity description
        status:
          type: string
          description: Entity status

    UpdateEntityResponse:
      type: object
      properties:
        message:
          type: string
          example: "Entity updated successfully"
        data:
          $ref: '#/components/schemas/Entity'

    RelatedItem:
      type: object
      properties:
        id:
          type: integer
          description: Related item ID
        field1:
          type: string
          description: Field 1 value
        field2:
          type: string
          description: Field 2 value
        entityId:
          type: integer
          description: Associated entity ID

    FileUploadResponse:
      type: object
      properties:
        filePath:
          type: string
          description: Uploaded file path
        fileType:
          type: string
          description: Uploaded file MIME type
      required:
        - filePath
        - fileType

    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
          description: Total number of records
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Records per page
        totalPages:
          type: integer
          description: Total number of pages
      required:
        - total
        - page
        - limit
        - totalPages

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
        error:
          type: string
          description: Detailed error information
      required:
        - message

tags:
  - name: Entities
    description: Operations related to entity management
  - name: File Upload
    description: Operations related to file uploads
